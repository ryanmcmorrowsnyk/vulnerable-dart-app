name: vulnerable_dart_app
description: Intentionally Vulnerable Flutter/Dart Application for Security Testing
version: 0.1.0

environment:
  sdk: '>=2.3.0 <3.0.0'

# 40+ vulnerable Dart/Flutter dependencies from 2019
# Expected 200+ total vulnerabilities including transitive dependencies

dependencies:
  flutter:
    sdk: flutter

  # Core Flutter packages (old vulnerable versions from 2019)
  cupertino_icons: ^0.1.2

  # HTTP/Networking (vulnerable versions)
  http: ^0.12.0
  dio: ^2.1.0
  connectivity: ^0.4.8
  web_socket_channel: ^1.1.0
  socket_io_client: ^0.9.10

  # State Management
  provider: ^3.2.0
  redux: ^3.0.0
  flutter_redux: ^0.5.3
  rxdart: ^0.22.6
  mobx: ^0.3.9
  flutter_mobx: ^0.3.4

  # Storage/Database
  sqflite: ^1.3.0
  shared_preferences: ^0.5.6
  hive: ^1.4.1
  moor: ^2.4.0
  sembast: ^2.4.0
  path_provider: ^1.6.5

  # JSON/Serialization
  json_annotation: ^3.0.0
  built_value: ^7.0.9

  # Image handling
  image_picker: ^0.6.3
  cached_network_image: ^2.0.0
  flutter_svg: ^0.17.0
  image: ^2.1.4

  # Authentication/Crypto
  firebase_auth: ^0.15.5
  google_sign_in: ^4.1.4
  local_auth: ^0.6.1
  crypto: ^2.1.3
  encrypt: ^3.3.1

  # UI Components
  flutter_slidable: ^0.5.4
  flutter_staggered_grid_view: ^0.3.0
  carousel_slider: ^1.4.1
  flutter_swiper: ^1.1.6

  # Utils
  intl: ^0.16.0
  url_launcher: ^5.4.2
  package_info: ^0.4.0
  device_info: ^0.4.1
  flutter_local_notifications: ^1.2.0

  # Video/Audio
  video_player: ^0.10.8
  audioplayers: ^0.14.0

  # Maps/Location
  geolocator: ^5.3.0
  google_maps_flutter: ^0.5.24
  location: ^2.5.4

  # Markdown/HTML
  flutter_markdown: ^0.3.3
  flutter_html: ^0.11.1
  webview_flutter: ^0.3.19

  # File handling
  path: ^1.6.4
  file_picker: ^1.5.0
  open_file: ^3.0.1

  # Analytics/Crashlytics
  firebase_analytics: ^5.0.11
  firebase_crashlytics: ^0.1.3

  # AWS
  amazon_cognito_identity_dart_2: ^0.1.15

  # GraphQL
  graphql_flutter: ^2.1.0

  # Testing utilities
  mockito: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^1.7.4
  json_serializable: ^3.2.5
  built_value_generator: ^7.0.9
  moor_generator: ^2.4.0
